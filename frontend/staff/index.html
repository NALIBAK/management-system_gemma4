<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff — CMS</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/aira.css">
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">🎓</div>
                <div class="logo-text">CMS <span>College Management</span></div>
            </div>
            <nav class="sidebar-nav"></nav>
        </aside>
        <div class="main-content">
            <header class="header" id="page-header"></header>
            <main class="page-content">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('staff')" id="btn-tab-staff">👨‍🏫 Staff
                        Members</button>
                    <button class="tab-btn" onclick="switchTab('users')" id="btn-tab-users" style="display:none">🔐 User
                        Accounts</button>
                </div>

                <!-- Staff Members Tab -->
                <div id="tab-staff">
                    <div class="card mb-4">
                        <div class="card-body">
                            <div class="flex items-center gap-3" style="flex-wrap:wrap">
                                <div class="search-bar">
                                    <span class="search-icon">🔍</span>
                                    <input type="text" class="form-control" id="search-input"
                                        placeholder="Search by name, employee ID...">
                                </div>
                                <select class="form-control" id="filter-dept" style="width:200px">
                                    <option value="">All Departments</option>
                                </select>
                                <a href="form.html" class="btn btn-primary" style="margin-left:auto">➕ Add Staff</a>
                            </div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">👨‍🏫 Staff Members (v2)</h3>
                            <span id="staff-count" class="badge badge-primary">—</span>
                        </div>
                        <div class="table-wrapper">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Employee ID</th>
                                        <th>Name</th>
                                        <th>Designation</th>
                                        <th>Department</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="staff-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- User Accounts Tab -->
                <div id="tab-users" style="display:none">
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">🔐 Manage System Access (Super Admin)</h3>
                        </div>
                        <div class="table-wrapper">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Staff Member</th>
                                        <th>Username</th>
                                        <th>System Role</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="users-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Password Reset Modal -->
    <div class="modal-overlay" id="reset-modal">
        <div class="modal" style="max-width:400px">
            <div class="modal-header">
                <h3 class="modal-title">Reset Credentials</h3>
                <button class="modal-close" onclick="utils.closeModal('reset-modal')">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="reset-user-id">
                <div class="form-group">
                    <label class="form-label">New Username</label>
                    <input type="text" id="reset-username" class="form-control"
                        placeholder="Leave blank to keep current">
                </div>
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" id="reset-password" class="form-control"
                        placeholder="Leave blank to keep current">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="utils.closeModal('reset-modal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveCredentials()">Save Changes</button>
            </div>
        </div>
    </div>
    <script src="../assets/js/theme.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/sidebar.js"></script>
    <script src="../assets/js/aira.js"></script>
    <script>
        auth.requireAuth();
        if (!auth.hasRole('super_admin', 'admin', 'hod')) {
            window.location.href = '../dashboard.html';
        }
        renderSidebar('staff');
        renderHeader('Staff Management', 'Manage faculty and staff records');

        async function loadStaff(params = {}) {
            const res = await api.get('/staff', params);
            if (res?.ok) {
                const staff = res.data.data || [];
                document.getElementById('staff-count').textContent = staff.length;
                utils.renderTable('staff-tbody', staff, s => `
        <tr>
          <td>${s.employee_id}</td>
          <td><strong>${s.name}</strong><br><small class="text-muted">${s.email || ''}</small></td>
          <td>${s.designation}</td>
          <td>${s.department_name || '—'}</td>
          <td>${utils.statusBadge(s.status)}</td>
          <td>
            <a href="form.html?id=${s.staff_id}" class="btn btn-ghost btn-sm">✏️ Edit</a>
          </td>
        </tr>`);
            }
        }

        function switchTab(tab) {
            ['staff', 'users'].forEach(t => {
                document.getElementById(`tab-${t}`).style.display = t === tab ? '' : 'none';
                document.getElementById(`btn-tab-${t}`).classList.toggle('active', t === tab);
            });
            if (tab === 'users') loadUsers();
        }

        async function loadDepts() {
            const res = await api.get('/college/departments');
            if (res?.ok) utils.populateSelect('filter-dept', res.data.data || [], 'department_id', 'name', 'All Departments');
        }

        document.getElementById('filter-dept').onchange = function () {
            loadStaff(this.value ? { department_id: this.value } : {});
        };
        const searchFn = utils.debounce(v => loadStaff(v ? { search: v } : {}), 400);
        document.getElementById('search-input').oninput = e => searchFn(e.target.value);

        // Super Admin purely: User Accounts Logic
        if (auth.hasRole('super_admin')) {
            document.getElementById('btn-tab-users').style.display = 'inline-block';
        }

        async function loadUsers() {
            const res = await api.get('/users');
            if (res?.ok) {
                const rolesHtml = `
                    <select class="form-control" onchange="changeRole(this)" style="padding:4px; height:auto; font-size:13px">
                        <option value="super_admin">Super Admin</option>
                        <option value="admin">Admin</option>
                        <option value="hod">HOD</option>
                        <option value="staff">Staff</option>
                    </select>
                `;

                utils.renderTable('users-tbody', res.data.data || [], u => {
                    const badge = u.is_active ? '<span class="badge badge-success">Active</span>' : '<span class="badge badge-error">Inactive</span>';
                    return `
                      <tr>
                        <td><strong>${u.staff_name || 'System Administrator'}</strong><br><small class="text-muted">${u.department_name || 'Global'}</small></td>
                        <td><code>${u.username}</code> ${badge}</td>
                        <td>
                            <select class="form-control" data-uid="${u.user_id}" onchange="changeRole(${u.user_id}, this.value)" style="padding:4px; height:auto; font-size:13px; width:130px">
                                <option value="super_admin" ${u.role_name === 'super_admin' ? 'selected' : ''}>Super Admin</option>
                                <option value="admin" ${u.role_name === 'admin' ? 'selected' : ''}>Admin</option>
                                <option value="hod" ${u.role_name === 'hod' ? 'selected' : ''}>HOD</option>
                                <option value="staff" ${u.role_name === 'staff' ? 'selected' : ''}>Staff</option>
                            </select>
                        </td>
                        <td>
                            <button class="btn btn-ghost btn-sm" onclick="openResetModal(${u.user_id}, '${u.username}')">🔑 Reset Credentials</button>
                        </td>
                      </tr>
                    `;
                });
            }
        }

        async function changeRole(userId, newRole) {
            const res = await api.put(`/users/${userId}/role`, { role_name: newRole });
            if (res?.ok) utils.toast('Role changed successfully', 'success');
            else { utils.toast(res?.data?.message || 'Failed to change role', 'error'); loadUsers(); }
        }

        function openResetModal(userId, currentUsername) {
            document.getElementById('reset-user-id').value = userId;
            document.getElementById('reset-username').value = currentUsername;
            document.getElementById('reset-password').value = '';
            utils.openModal('reset-modal');
        }

        async function saveCredentials() {
            const userId = document.getElementById('reset-user-id').value;
            const newUsername = document.getElementById('reset-username').value;
            const newPassword = document.getElementById('reset-password').value;

            const res = await api.put(`/users/${userId}/reset-password`, {
                new_username: newUsername,
                new_password: newPassword
            });

            if (res?.ok) {
                utils.toast('Credentials updated!', 'success');
                utils.closeModal('reset-modal');
                loadUsers();
            } else {
                utils.toast(res?.data?.message || 'Update failed', 'error');
            }
        }

        loadDepts(); loadStaff();
    </script>
</body>

</html>
