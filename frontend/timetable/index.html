<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable — CMS</title>
    <link rel="stylesheet" href="../assets/css/main.css?v=3">
    <link rel="stylesheet" href="../assets/css/aira.css?v=3">
    <style>
        .tt-grid {
            display: grid;
            grid-template-columns: 100px repeat(7, minmax(120px, 1fr));
            gap: 4px;
            margin-top: 4px;
        }

        .tt-header {
            background: var(--bg-tertiary);
            padding: 10px;
            text-align: center;
            font-weight: 700;
            font-size: 13px;
            border-radius: var(--radius-sm);
        }

        .tt-cell {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 8px;
            min-height: 70px;
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            /* For delete button positioning */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .tt-cell:hover {
            border-color: var(--accent);
            background: var(--bg-secondary);
        }

        .tt-cell.filled {
            background: var(--accent-light);
            border-color: var(--accent);
        }

        .tt-cell.empty {
            border: 1px dashed var(--border);
            background: transparent;
            align-items: center;
        }
        
        .tt-cell.empty:hover {
            border: 1px solid var(--accent);
            background: var(--bg-hover);
        }
        
        .tt-cell.empty::after {
            content: "➕";
            opacity: 0;
            transition: var(--transition);
        }
        
        .tt-cell.empty:hover::after {
            opacity: 0.5;
        }

        .tt-cell .subject {
            font-weight: 700;
            color: var(--accent);
        }

        .tt-cell .staff {
            color: var(--text-muted);
            margin-top: 2px;
        }

        .tt-cell .room {
            color: var(--text-muted);
            font-size: 11px;
            margin-top: auto;
        }

        .tt-delete-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--danger);
            color: white;
            border: none;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
            opacity: 0.8;
            transition: var(--transition);
        }

        .tt-cell:hover .tt-delete-btn {
            display: flex;
        }

        .tt-delete-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .tt-period-label {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">🎓</div>
                <div class="logo-text">CMS <span>College Management</span></div>
            </div>
            <nav class="sidebar-nav"></nav>
        </aside>
        <div class="main-content">
            <header class="header" id="page-header"></header>
            <main class="page-content">
                <div class="card mb-4">
                    <div class="card-body">
                        <div class="flex gap-3 items-center" style="flex-wrap:wrap">
                            <div class="form-group" style="margin:0;min-width:200px">
                                <label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px;">Filter by Section:</label>
                                <select class="form-control" id="tt-section" onchange="handleFilterChange('section')">
                                    <option value="">Select Section</option>
                                </select>
                            </div>
                            <div style="font-weight:600;color:var(--text-muted);font-size:14px;margin-top:16px;">OR</div>
                            <div class="form-group" style="margin:0;min-width:200px">
                                <label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px;">Filter by Staff:</label>
                                <select class="form-control" id="tt-staff-filter" onchange="handleFilterChange('staff')">
                                    <option value="">Select Staff</option>
                                </select>
                            </div>
                            <button class="btn btn-primary" onclick="openAddModal('', '')" style="margin-left:auto; margin-top:16px;">➕ Add
                                Entry</button>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">🗓️ Weekly Timetable</h3>
                    </div>
                    <div class="card-body" style="overflow-x:auto">
                        <div id="tt-body">
                            <div id="tt-empty-state"
                                style="text-align:center;padding:40px 20px;color:var(--text-muted)">
                                <div style="font-size:48px;margin-bottom:12px">📋</div>
                                <div style="font-size:16px;font-weight:600;margin-bottom:4px">No timetable to display
                                </div>
                                <div style="font-size:13px">Select a section from the dropdown above to view the weekly
                                    timetable.</div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Add Timetable Entry Modal -->
    <div class="modal-overlay" id="add-tt-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Add Timetable Entry</h3><button class="modal-close"
                    onclick="utils.closeModal('add-tt-modal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Day</label>
                        <select id="tt-day" class="form-control">
                            <option>Monday</option>
                            <option>Tuesday</option>
                            <option>Wednesday</option>
                            <option>Thursday</option>
                            <option>Friday</option>
                            <option>Saturday</option>
                        </select>
                    </div>
                    <div class="form-group"><label class="form-label">Period</label><select id="tt-period"
                            class="form-control"></select></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Subject</label><select id="tt-subject"
                            class="form-control"></select></div>
                    <div class="form-group"><label class="form-label">Staff</label><select id="tt-staff"
                            class="form-control"></select></div>
                </div>
                <div class="form-group"><label class="form-label">Room</label><select id="tt-room"
                        class="form-control"></select></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="utils.closeModal('add-tt-modal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveTTEntry()">Add Entry</button>
            </div>
        </div>
    </div>

    <script src="../assets/js/theme.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/sidebar.js"></script>
    <script src="../assets/js/aira.js"></script>
    <script>
        auth.requireAuth();
        renderSidebar('timetable');
        renderHeader('Timetable', 'View and manage class timetables');

        const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        let periods = [], currentAY = null;

        async function init() {
            const [sectRes, perRes, subRes, staffRes, roomRes, ayRes] = await Promise.all([
                api.get('/students/sections'),
                api.get('/timetable/periods'),
                api.get('/courses/subjects'),
                api.get('/staff/'),
                api.get('/timetable/rooms'),
                api.get('/college/academic-years')
            ]);
            if (sectRes?.ok) utils.populateSelect('tt-section', sectRes.data.data || [], 'section_id', s => `${s.course_name} - ${s.name}`, 'Select Section');
            if (perRes?.ok) {
                periods = perRes.data.data || [];
                utils.populateSelect('tt-period', periods, 'period_id', p => `${p.label} (${p.start_time})`, 'Select Period');
            }
            if (subRes?.ok) utils.populateSelect('tt-subject', subRes.data.data || [], 'subject_id', 'name', 'Select Subject');
            if (staffRes?.ok) {
                utils.populateSelect('tt-staff', staffRes.data.data || [], 'staff_id', 'name', 'Select Staff');
                utils.populateSelect('tt-staff-filter', staffRes.data.data || [], 'staff_id', 'name', 'Select Staff');
            }
            if (roomRes?.ok) utils.populateSelect('tt-room', roomRes.data.data || [], 'room_id', 'name', 'Select Room');
            if (ayRes?.ok) currentAY = (ayRes.data.data || []).find(a => a.is_current) || ayRes.data.data?.[0];
            
            // Auto-load if staff/student viewing their own
            const user = JSON.parse(localStorage.getItem('cms_user') || '{}');
            if (user.role === 'staff' && user.staff_id) {
                document.getElementById('tt-staff-filter').value = user.staff_id;
                document.getElementById('tt-section').disabled = true;
                document.getElementById('tt-staff-filter').disabled = true;
                loadTimetable();
            }
        }

        function handleFilterChange(type) {
            if (type === 'section') {
                document.getElementById('tt-staff-filter').value = '';
            } else if (type === 'staff') {
                document.getElementById('tt-section').value = '';
            }
            loadTimetable();
        }

        function openAddModal(day = '', periodId = '') {
            document.getElementById('tt-day').value = day || 'Monday';
            document.getElementById('tt-period').value = periodId || periods[0]?.period_id || '';
            
            // Pre-select section/staff if currently filtered
            const sectionId = document.getElementById('tt-section').value;
            const staffId = document.getElementById('tt-staff-filter').value;
            // Only section_id is required for a new entry structurally, but the user must pick.
            
            utils.openModal('add-tt-modal');
        }

        async function loadTimetable() {
            const sectionId = document.getElementById('tt-section').value;
            const staffId = document.getElementById('tt-staff-filter').value;
            
            if (!sectionId && !staffId) {
                document.getElementById('tt-body').innerHTML = `
                    <div id="tt-empty-state" style="text-align:center;padding:40px 20px;color:var(--text-muted)">
                        <div style="font-size:48px;margin-bottom:12px">📋</div>
                        <div style="font-size:16px;font-weight:600;margin-bottom:4px">No timetable to display</div>
                        <div style="font-size:13px">Select a section or staff member to view the weekly timetable.</div>
                    </div>`;
                return;
            }

            const params = {};
            if (sectionId) params.section_id = sectionId;
            if (staffId) params.staff_id = staffId;
            
            const res = await api.get('/timetable/', params);
            const entries = res?.data?.data || [];

            const ttBody = document.getElementById('tt-body');
            
            // Build single unified grid
            let html = '<div class="tt-grid">';
            
            // Grid Headers
            html += `
                <div></div>
                <div class="tt-header">Mon</div>
                <div class="tt-header">Tue</div>
                <div class="tt-header">Wed</div>
                <div class="tt-header">Thu</div>
                <div class="tt-header">Fri</div>
                <div class="tt-header">Sat</div>
                <div class="tt-header">Sun</div>
            `;

            periods.forEach(p => {
                html += `<div class="tt-period-label">${p.label}<br><small>${p.start_time}</small></div>`;
                
                DAYS.forEach(day => {
                    const entry = entries.find(e => e.day_of_week === day && e.period_id === p.period_id);
                    
                    if (entry) {
                        const displayTitle = staffId ? entry.section_name : entry.staff_name;
                        html += `
                            <div class="tt-cell filled">
                                <button class="tt-delete-btn" onclick="deleteTTEntry(${entry.timetable_id})" title="Delete entry">✕</button>
                                <div class="subject">${entry.subject_name}</div>
                                <div class="staff">${displayTitle}</div>
                                <div class="room">${entry.room_name || ''}</div>
                            </div>
                        `;
                    } else {
                        html += `<div class="tt-cell empty" onclick="openAddModal('${day}', '${p.period_id}')" title="Click to add entry"></div>`;
                    }
                });
            });
            
            html += '</div>';
            ttBody.innerHTML = html;
        }

        async function deleteTTEntry(id) {
            utils.confirm('Delete this timetable entry?', async () => {
                const res = await api.delete(`/timetable/${id}`);
                if (res?.ok) {
                    utils.toast('Entry deleted', 'success');
                    loadTimetable();
                } else {
                    utils.toast(res?.data?.message || 'Failed to delete', 'error');
                }
            });
        }

        async function saveTTEntry() {
            // Ensure section_id is populated via dropdown if filtered
            let sectionId = document.getElementById('tt-section').value;
            
            if (!sectionId) {
                utils.toast('Please select a Target Section from the top filter to add an entry, even if you are viewing a Staff timetable.', 'warning');
                return;
            }
            const res = await api.post('/timetable/', {
                section_id: sectionId,
                subject_id: document.getElementById('tt-subject').value,
                staff_id: document.getElementById('tt-staff').value,
                room_id: document.getElementById('tt-room').value,
                period_id: document.getElementById('tt-period').value,
                day_of_week: document.getElementById('tt-day').value,
                academic_year_id: currentAY?.academic_year_id
            });
            if (res?.ok) { utils.toast('Entry added!', 'success'); utils.closeModal('add-tt-modal'); loadTimetable(); }
            else utils.toast(res?.data?.message || 'Failed', 'error');
        }

        init();
    </script>
</body>

</html>
